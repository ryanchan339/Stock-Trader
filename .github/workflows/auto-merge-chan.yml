name: Auto-merge chan to main

# Automatically merges pull requests from the long-lived `chan` working branch
# into `main`. A merge commit (not squash/rebase) is used so `chan` and `main`
# stay reconcilable and future merges don't conflict.

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only auto-merge PRs coming from `chan`, and never drafts.
    if: github.event.pull_request.head.ref == 'chan' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --merge --repo "${{ github.repository }}"
