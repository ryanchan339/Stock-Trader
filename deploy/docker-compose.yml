# Alternative to systemd: run the service with Docker Compose.
#   docker compose -f deploy/docker-compose.yml up -d --build
#   docker compose -f deploy/docker-compose.yml logs -f
services:
  stock-trader:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    # Default is safe dry-run. Add --submit (paper only) when ready.
    command: ["--universe", "starter"]
    restart: always
    # Persist audit logs outside the container.
    volumes:
      - ../reports:/app/reports
